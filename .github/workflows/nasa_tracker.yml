name: Daily NASA ETF & SpaceX Tracker

on:
  schedule:
    # Runs daily at 23:00 UTC (6:00 PM EST / 7:00 PM EDT), after market close
    - cron: '0 23 * * *'
  workflow_dispatch:
    # Allows manual trigger of the action from GitHub repository page

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # caching pip dependencies for faster runs

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run NASA Tracker Script
      env:
        GOOGLE_SHEET_WEBAPP_URL: ${{ secrets.GOOGLE_SHEET_WEBAPP_URL }}
      run: python tracker.py
